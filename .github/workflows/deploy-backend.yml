name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'oneyear-back/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
      BACKEND_PM2_APP: ${{ secrets.BACKEND_PM2_APP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -e
          for v in SERVER_HOST SERVER_PORT SERVER_USER SERVER_SSH_KEY BACKEND_DEPLOY_PATH BACKEND_PM2_APP; do
            if [ -z "${!v}" ]; then
              echo "Missing secret: $v"
              exit 1
            fi
          done

      - name: Setup SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          printf "%s" "$SERVER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SERVER_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" "echo ssh-ok"

      - name: Sync backend source
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude '.git' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SERVER_PORT -o StrictHostKeyChecking=yes" \
            oneyear-back/ \
            "$SERVER_USER@$SERVER_HOST:$BACKEND_DEPLOY_PATH/"

      - name: Install prod deps and restart PM2
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" << EOF
            set -e
            cd "$BACKEND_DEPLOY_PATH"
            npm install --omit=dev
            pm2 restart "$BACKEND_PM2_APP" || pm2 start src/server.js --name "$BACKEND_PM2_APP"
          EOF
