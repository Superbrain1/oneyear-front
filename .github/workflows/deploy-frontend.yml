name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'oneyear-fronte/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard secrets
        id: guard
        run: |
          set -e
          missing=0
          for v in SERVER_HOST SERVER_PORT SERVER_USER SERVER_SSH_KEY FRONTEND_DEPLOY_PATH; do
            if [ -z "${!v}" ]; then
              echo "Missing secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'oneyear-fronte/package-lock.json'

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        working-directory: oneyear-fronte
        run: npm ci

      - name: Build frontend
        if: steps.guard.outputs.ready == 'true'
        working-directory: oneyear-fronte
        run: npm run build

      - name: Setup SSH key
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -e
          mkdir -p ~/.ssh
          if printf "%s" "$SERVER_SSH_KEY" | grep -q '\\n'; then
            printf "%b" "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          else
            printf "%s" "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          fi
          tr -d '\r' < ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.tmp
          mv ~/.ssh/id_ed25519.tmp ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        if: steps.guard.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SERVER_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SERVER_USER@$SERVER_HOST" "echo ssh-ok"

      - name: Upload dist to server
        if: steps.guard.outputs.ready == 'true'
        run: |
          rsync -az --delete \
            --exclude '.user.ini' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SERVER_PORT -o StrictHostKeyChecking=yes" \
            oneyear-fronte/dist/ \
            "$SERVER_USER@$SERVER_HOST:$FRONTEND_DEPLOY_PATH/"

      - name: Skip notice
        if: steps.guard.outputs.ready != 'true'
        run: echo "Skipping frontend deploy due to missing secrets"
