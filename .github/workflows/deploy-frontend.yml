name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'oneyear-fronte/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'oneyear-fronte/package-lock.json'

      - name: Install dependencies
        working-directory: oneyear-fronte
        run: npm ci

      - name: Build frontend
        working-directory: oneyear-fronte
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload dist to server
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            oneyear-fronte/dist/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.FRONTEND_DEPLOY_PATH }}/"
